<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoltFi — Product Walkthrough</title>
  <meta name="description" content="Watch the VoltFi Gold Yield Vault walkthrough. Tokenised gold yield on Stacks, secured by Bitcoin." />

  <link rel="icon" type="image/png" href="/voltfi-logo-192.png" />
  <link rel="stylesheet" href="/styles.css" />

  <!-- Open Graph — makes Telegram/Twitter/Discord unfurls look right -->
  <meta property="og:title" content="VoltFi — Product Walkthrough" />
  <meta property="og:description" content="Tokenised gold yield on Stacks. Watch the live product walkthrough." />
  <meta property="og:image" content="https://info.voltfi.xyz/voltfi-logo-192.png" />
  <meta property="og:video" content="https://info.voltfi.xyz/voltfi-gold-yield-live.mp4" />
  <meta property="og:video:type" content="video/mp4" />
  <meta property="og:url" content="https://info.voltfi.xyz/gold-yield" />
  <meta name="twitter:card" content="player" />

  <style>
    /* Local additions — everything else comes from /styles.css */
    .info-hero { padding: 3.5rem 0 2rem; }
    .info-hero__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--gold);
      background: var(--gold-bg);
      border: 1px solid var(--gold-border);
      padding: 0.375rem 0.75rem;
      border-radius: 9999px;
      margin-bottom: 1rem;
    }
    .info-hero__title {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.15;
      margin-bottom: 0.75rem;
    }
    .info-hero__lede {
      font-size: 1.125rem;
      color: var(--muted-foreground);
      max-width: 44rem;
      margin-bottom: 2rem;
    }
    .info-player {
      width: 100%;
      max-width: 640px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      margin: 0 auto;
    }
    .info-player video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .info-cta-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 2rem;
    }
    .info-footer {
      padding: 3rem 0 4rem;
      color: var(--muted-foreground);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

  <header class="container" style="padding-top: 1.5rem; padding-bottom: 1rem; display: flex; align-items: center; justify-content: space-between;">
    <a href="https://voltfi.xyz/" style="display: inline-flex; align-items: center; gap: 0.625rem; font-weight: 700;">
      <img src="/voltfi-logo-192.png" alt="VoltFi" width="28" height="28" style="border-radius: 6px;" />
      <span>VoltFi</span>
    </a>
    <a href="https://app.voltfi.xyz/" class="btn-primary btn-primary--sm">Launch App</a>
  </header>

  <main>
    <section class="container info-hero">
      <span class="info-hero__eyebrow">Product Walkthrough</span>
      <h1 class="info-hero__title">See VoltFi Gold Vault in action</h1>
      <p class="info-hero__lede">
        A short walkthorugh on how to use VoltFi tokenised gold yield on Stacks —
        USDCx and STX deposits.
      </p>

      <div class="info-player">
        <video controls preload="metadata" playsinline poster="/voltfi-logo-192.png">
          <source src="/voltfi-gold-yield-live.mp4" type="video/mp4" />
          Your browser doesn't support inline video.
          <a href="/voltfi-gold-yield-live.mp4">Download the walkthrough</a>
        </video>
      </div>

      <div class="info-cta-row">
        <a href="https://app.voltfi.xyz/" class="btn-primary">Launch App</a>
      </div>
    </section>
  </main>

  <footer class="container info-footer">
    VoltFi &middot; Gold yield on Bitcoin L2, secured by Stacks.
  </footer>

</body>
</html>
